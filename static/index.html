<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Is My IP Address?</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --text-primary: #1a202c;
      --text-muted: #718096;
      --btn-bg: #4f46e5;
      --btn-hover: #4338ca;
      --btn-disabled: #a5b4fc;
      --ip-bg: #f0fdf4;
      --ip-border: #bbf7d0;
      --ip-color: #166534;
      --ip-label: #4ade80;
      --info-bg: #f8faff;
      --info-border: #e0e7ff;
      --info-row-border: #eef2ff;
      --info-label: #6366f1;
      --info-value: #1e293b;
      --error: #dc2626;
      --loading: #6366f1;
      --toggle-bg: #e2e8f0;
      --toggle-knob: #fff;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text-primary: #f1f5f9;
      --text-muted: #94a3b8;
      --btn-bg: #6366f1;
      --btn-hover: #4f46e5;
      --btn-disabled: #3730a3;
      --ip-bg: #052e16;
      --ip-border: #166534;
      --ip-color: #4ade80;
      --ip-label: #86efac;
      --info-bg: #1a1f35;
      --info-border: #312e81;
      --info-row-border: #1e2540;
      --info-label: #818cf8;
      --info-value: #e2e8f0;
      --error: #f87171;
      --loading: #818cf8;
      --toggle-bg: #4f46e5;
      --toggle-knob: #fff;
      --shadow: 0 4px 24px rgba(0,0,0,0.40);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      transition: background 0.3s;
    }

    /* Dark mode toggle */
    .theme-toggle {
      position: fixed;
      top: 20px; right: 20px;
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; user-select: none;
    }
    .theme-toggle span { font-size: 0.8rem; color: var(--text-muted); transition: color 0.3s; }
    .toggle-track {
      width: 44px; height: 24px;
      background: var(--toggle-bg); border-radius: 999px;
      position: relative; transition: background 0.3s;
    }
    .toggle-knob {
      position: absolute; top: 3px; left: 3px;
      width: 18px; height: 18px;
      background: var(--toggle-knob); border-radius: 50%;
      transition: transform 0.3s; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    [data-theme="dark"] .toggle-knob { transform: translateX(20px); }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 48px 40px;
      text-align: center;
      max-width: 500px;
      width: 100%;
      transition: background 0.3s, box-shadow 0.3s;
    }
    h1 { font-size: 1.6rem; color: var(--text-primary); margin-bottom: 8px; transition: color 0.3s; }
    p { color: var(--text-muted); margin-bottom: 32px; font-size: 0.95rem; transition: color 0.3s; }

    button {
      background: var(--btn-bg); color: #fff; border: none;
      border-radius: 8px; padding: 14px 36px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: var(--btn-hover); }
    button:active { transform: scale(0.97); }
    button:disabled { background: var(--btn-disabled); cursor: not-allowed; }

    #status { margin-top: 24px; font-size: 0.9rem; min-height: 24px; }
    .error { color: var(--error); }
    .loading { color: var(--loading); }

    /* IP display */
    .ip-display {
      margin-top: 16px;
      background: var(--ip-bg);
      border: 1px solid var(--ip-border);
      border-radius: 8px;
      padding: 16px 20px;
      display: none;
      transition: background 0.3s, border-color 0.3s;
    }
    .ip-label {
      font-size: 0.75rem; font-weight: 400;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--ip-label); display: block; margin-bottom: 8px;
      transition: color 0.3s;
    }
    .ip-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
    #ipValue {
      font-family: monospace; font-size: 1.4rem; font-weight: 700;
      color: var(--ip-color); letter-spacing: 0.04em; transition: color 0.3s;
    }
    .copy-btn {
      background: transparent;
      border: 1.5px solid var(--ip-border);
      border-radius: 6px; padding: 4px 10px;
      font-size: 0.8rem; font-weight: 600;
      color: var(--ip-color); cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .copy-btn:hover { background: var(--ip-border); }
    .copy-btn.copied { color: #16a34a; border-color: #16a34a; }

    /* Reveal more button */
    .reveal-wrap {
      margin-top: 16px;
      display: none;
      text-align: center;
    }
    .reveal-btn {
      background: transparent;
      border: 1.5px solid var(--btn-bg);
      color: var(--btn-bg);
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      width: 100%;
    }
    .reveal-btn:hover { background: var(--btn-bg); color: #fff; }
    .reveal-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Info panel */
    .info-panel {
      margin-top: 16px;
      background: var(--info-bg);
      border: 1px solid var(--info-border);
      border-radius: 8px;
      overflow: hidden;
      display: none;
      text-align: left;
      transition: background 0.3s, border-color 0.3s;
    }
    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      border-bottom: 1px solid var(--info-row-border);
      gap: 12px;
      transition: border-color 0.3s;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--info-label);
      white-space: nowrap;
      transition: color 0.3s;
    }
    .info-val {
      font-size: 0.88rem;
      color: var(--info-value);
      text-align: right;
      transition: color 0.3s;
    }
    .tag {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .tag-yes { background: #fef2f2; color: #dc2626; }
    .tag-no  { background: #f0fdf4; color: #16a34a; }
    [data-theme="dark"] .tag-yes { background: #450a0a; color: #fca5a5; }
    [data-theme="dark"] .tag-no  { background: #052e16; color: #86efac; }
    .info-loading { padding: 20px; text-align: center; color: var(--text-muted); font-size: 0.9rem; }
  </style>
</head>
<body>

  <label class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
    <span id="themeLabel">🌙 Dark</span>
    <div class="toggle-track"><div class="toggle-knob"></div></div>
  </label>

  <div class="card">
    <h1>🌐 What Is My IP?</h1>
    <p>Click the button to reveal and save your public IP address.</p>
    <button id="showBtn" onclick="showIP()">Show My IP Address</button>
    <div id="status"></div>

    <div id="ipDisplay" class="ip-display">
      <span class="ip-label">Your public IP address</span>
      <div class="ip-row">
        <span id="ipValue"></span>
        <button class="copy-btn" id="copyBtn" onclick="copyIP()">Copy</button>
      </div>
    </div>

    <div class="reveal-wrap" id="revealWrap">
      <button class="reveal-btn" id="revealBtn" onclick="revealInfo()">
        🔍 What does my IP reveal?
      </button>
    </div>

    <div class="info-panel" id="infoPanel"></div>
  </div>

  <script>
    const API_URL = 'https://0s4pepzdxf.execute-api.ap-southeast-5.amazonaws.com/prod';

    const saved = localStorage.getItem('theme') || 'light';
    setTheme(saved);

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('themeLabel').textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
      localStorage.setItem('theme', theme);
    }
    function toggleTheme() {
      setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    async function showIP() {
      const btn = document.getElementById('showBtn');
      const status = document.getElementById('status');
      const ipDisplay = document.getElementById('ipDisplay');
      const copyBtn = document.getElementById('copyBtn');

      btn.disabled = true;
      status.className = 'loading';
      status.textContent = 'Looking up your IP address…';
      ipDisplay.style.display = 'none';
      document.getElementById('revealWrap').style.display = 'none';
      document.getElementById('infoPanel').style.display = 'none';
      copyBtn.textContent = 'Copy';
      copyBtn.classList.remove('copied');

      try {
        const res = await fetch(`${API_URL}/log-ip`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        status.textContent = '';
        document.getElementById('ipValue').textContent = data.ip;
        ipDisplay.style.display = 'block';
        document.getElementById('revealWrap').style.display = 'block';
      } catch (err) {
        status.className = 'error';
        status.textContent = `❌ Could not retrieve IP: ${err.message}`;
      } finally {
        btn.disabled = false;
      }
    }

    async function copyIP() {
      const ip = document.getElementById('ipValue').textContent;
      const btn = document.getElementById('copyBtn');
      try {
        await navigator.clipboard.writeText(ip);
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      } catch {
        btn.textContent = 'Failed';
        setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
      }
    }

    async function revealInfo() {
      const ip = document.getElementById('ipValue').textContent;
      const panel = document.getElementById('infoPanel');
      const btn = document.getElementById('revealBtn');

      btn.disabled = true;
      panel.style.display = 'block';
      panel.innerHTML = '<div class="info-loading">🔍 Analysing your IP…</div>';

      try {
        // ip-api.com free tier — no API key needed, 45 req/min
        const res = await fetch(`https://ip-api.com/json/${ip}?fields=status,country,regionName,city,zip,isp,org,as,mobile,proxy,hosting,lat,lon,timezone`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const d = await res.json();

        if (d.status !== 'success') throw new Error('Lookup failed');

        const boolTag = (val) => val
          ? '<span class="tag tag-yes">Yes</span>'
          : '<span class="tag tag-no">No</span>';

        const rows = [
          ['🌍 Country',    escHtml(d.country)],
          ['📍 Region',     escHtml(d.regionName)],
          ['🏙️ City',       escHtml(d.city)],
          ['📮 Postal',     escHtml(d.zip || '—')],
          ['🕐 Timezone',   escHtml(d.timezone)],
          ['📡 ISP',        escHtml(d.isp)],
          ['🏢 Org',        escHtml(d.org)],
          ['🔢 ASN',        escHtml(d.as)],
          ['📱 Mobile',     boolTag(d.mobile)],
          ['🕵️ VPN/Proxy',  boolTag(d.proxy)],
          ['🖥️ Datacenter', boolTag(d.hosting)],
        ];

        panel.innerHTML = rows.map(([k, v]) =>
          `<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`
        ).join('');

        // Change button to a collapse toggle
        btn.textContent = '▲ Hide details';
        btn.onclick = toggleInfo;
        btn.disabled = false;
      } catch (err) {
        panel.innerHTML = `<div class="info-loading" style="color:var(--error)">❌ Lookup failed: ${err.message}</div>`;
        btn.disabled = false;
      }
    }

    function toggleInfo() {
      const panel = document.getElementById('infoPanel');
      const btn = document.getElementById('revealBtn');
      const hidden = panel.style.display === 'none';
      panel.style.display = hidden ? 'block' : 'none';
      btn.textContent = hidden ? '▲ Hide details' : '🔍 What does my IP reveal?';
    }

    function escHtml(s) {
      return String(s || '—').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
