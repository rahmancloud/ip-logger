<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Is My IP Address?</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    h1 { font-size: 1.6rem; color: #1a202c; margin-bottom: 8px; }
    p { color: #718096; margin-bottom: 32px; font-size: 0.95rem; }
    button {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #4338ca; }
    button:active { transform: scale(0.97); }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    #status {
      margin-top: 24px;
      font-size: 0.9rem;
      min-height: 24px;
      transition: all 0.3s;
    }
    .success { color: #16a34a; }
    .error { color: #dc2626; }
    .loading { color: #6366f1; }
    .ip-display {
      margin-top: 16px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 16px 20px;
      font-family: monospace;
      font-size: 1.4rem;
      font-weight: 700;
      color: #166534;
      display: none;
      letter-spacing: 0.04em;
    }
    .ip-label {
      font-size: 0.75rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #4ade80;
      display: block;
      margin-bottom: 4px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🌐 What Is My IP?</h1>
    <p>Click the button to reveal and save your public IP address.</p>
    <button id="showBtn" onclick="showIP()">Show My IP Address</button>
    <div id="status"></div>
    <div id="ipDisplay" class="ip-display">
      <span class="ip-label">Your public IP address</span>
      <span id="ipValue"></span>
    </div>
  </div>

  <script>
    const API_URL = 'https://0s4pepzdxf.execute-api.ap-southeast-5.amazonaws.com/prod';

    async function showIP() {
      const btn = document.getElementById('showBtn');
      const status = document.getElementById('status');
      const ipDisplay = document.getElementById('ipDisplay');
      const ipValue = document.getElementById('ipValue');

      btn.disabled = true;
      status.className = 'loading';
      status.textContent = 'Looking up your IP address…';
      ipDisplay.style.display = 'none';

      try {
        const res = await fetch(`${API_URL}/log-ip`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        status.className = 'success';
        status.textContent = '✅ IP address saved successfully!';
        ipValue.textContent = data.ip;
        ipDisplay.style.display = 'block';
      } catch (err) {
        status.className = 'error';
        status.textContent = `❌ Could not retrieve IP: ${err.message}`;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
