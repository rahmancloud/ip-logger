<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Is My IP Address?</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --text-primary: #1a202c;
      --text-muted: #718096;
      --btn-bg: #4f46e5;
      --btn-hover: #4338ca;
      --btn-disabled: #a5b4fc;
      --ip-bg: #f0fdf4;
      --ip-border: #bbf7d0;
      --ip-color: #166534;
      --ip-label: #4ade80;
      --error: #dc2626;
      --loading: #6366f1;
      --toggle-bg: #e2e8f0;
      --toggle-knob: #fff;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text-primary: #f1f5f9;
      --text-muted: #94a3b8;
      --btn-bg: #6366f1;
      --btn-hover: #4f46e5;
      --btn-disabled: #3730a3;
      --ip-bg: #052e16;
      --ip-border: #166534;
      --ip-color: #4ade80;
      --ip-label: #86efac;
      --error: #f87171;
      --loading: #818cf8;
      --toggle-bg: #4f46e5;
      --toggle-knob: #fff;
      --shadow: 0 4px 24px rgba(0,0,0,0.40);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    /* Dark mode toggle */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .theme-toggle span {
      font-size: 0.8rem;
      color: var(--text-muted);
      transition: color 0.3s;
    }
    .toggle-track {
      width: 44px;
      height: 24px;
      background: var(--toggle-bg);
      border-radius: 999px;
      position: relative;
      transition: background 0.3s;
    }
    .toggle-knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: var(--toggle-knob);
      border-radius: 50%;
      transition: transform 0.3s, background 0.3s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    [data-theme="dark"] .toggle-knob {
      transform: translateX(20px);
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 48px 40px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      transition: background 0.3s, box-shadow 0.3s;
    }
    h1 { font-size: 1.6rem; color: var(--text-primary); margin-bottom: 8px; transition: color 0.3s; }
    p { color: var(--text-muted); margin-bottom: 32px; font-size: 0.95rem; transition: color 0.3s; }

    button {
      background: var(--btn-bg);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: var(--btn-hover); }
    button:active { transform: scale(0.97); }
    button:disabled { background: var(--btn-disabled); cursor: not-allowed; }

    #status {
      margin-top: 24px;
      font-size: 0.9rem;
      min-height: 24px;
    }
    .error { color: var(--error); }
    .loading { color: var(--loading); }

    .ip-display {
      margin-top: 16px;
      background: var(--ip-bg);
      border: 1px solid var(--ip-border);
      border-radius: 8px;
      padding: 16px 20px;
      font-family: monospace;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--ip-color);
      display: none;
      letter-spacing: 0.04em;
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }
    .ip-label {
      font-size: 0.75rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ip-label);
      display: block;
      margin-bottom: 4px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      transition: color 0.3s;
    }
  </style>
</head>
<body>

  <label class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
    <span id="themeLabel">🌙 Dark</span>
    <div class="toggle-track">
      <div class="toggle-knob"></div>
    </div>
  </label>

  <div class="card">
    <h1>🌐 What Is My IP?</h1>
    <p>Click the button to reveal and save your public IP address.</p>
    <button id="showBtn" onclick="showIP()">Show My IP Address</button>
    <div id="status"></div>
    <div id="ipDisplay" class="ip-display">
      <span class="ip-label">Your public IP address</span>
      <span id="ipValue"></span>
    </div>
  </div>

  <script>
    const API_URL = 'https://0s4pepzdxf.execute-api.ap-southeast-5.amazonaws.com/prod';

    // Persist theme across page loads
    const saved = localStorage.getItem('theme') || 'light';
    setTheme(saved);

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('themeLabel').textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
      localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    }

    async function showIP() {
      const btn = document.getElementById('showBtn');
      const status = document.getElementById('status');
      const ipDisplay = document.getElementById('ipDisplay');
      const ipValue = document.getElementById('ipValue');

      btn.disabled = true;
      status.className = 'loading';
      status.textContent = 'Looking up your IP address…';
      ipDisplay.style.display = 'none';

      try {
        const res = await fetch(`${API_URL}/log-ip`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        status.textContent = '';
        ipValue.textContent = data.ip;
        ipDisplay.style.display = 'block';
      } catch (err) {
        status.className = 'error';
        status.textContent = `❌ Could not retrieve IP: ${err.message}`;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
