AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Show My IP — Serverless stack that shows visitors their public IP address
  and an admin dashboard to view all recorded IPs.
  Resources: DynamoDB, Lambda (x2), API Gateway, S3, CloudFront (OAC), ACM.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  AdminApiKey:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: Secret key required to access the admin /admin/ips endpoint.
    Default: CHANGE_ME_USE_A_STRONG_SECRET

  CustomDomain:
    Type: String
    Default: myip.amancloud.com
    Description: Custom domain name for the CloudFront distribution.

  AcmCertificateArn:
    Type: String
    Description: >
      ARN of the ACM certificate for the custom domain.
      Must be in us-east-1 (required for CloudFront).
    Default: arn:aws:acm:us-east-1:088044432122:certificate/ba2a34f3-2888-4591-ac91-826525caff65

  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging, dev]
    Description: Deployment environment tag.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── DynamoDB ──────────────────────────────────────────────────────────────
  IpLogsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: ip_logs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: show-my-ip
        - Key: Environment
          Value: !Ref Environment

  # ── IAM Role for Lambda ───────────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    Properties:
      RoleName: ip-logger-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ip-logger-dynamo
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt IpLogsTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                Resource: !GetAtt IpLogsTable.Arn

  # ── Lambda: log IP ────────────────────────────────────────────────────────
  LogIpFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    Properties:
      FunctionName: ip-logger-log
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: log_ip.handler
      Timeout: 10
      Code:
        ZipFile: |
          import boto3, uuid, json
          from datetime import datetime, timezone
          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('ip_logs')
          def handler(event, context):
              ip = event.get('requestContext', {}).get('identity', {}).get('sourceIp', 'unknown')
              item = {
                  'id': str(uuid.uuid4()),
                  'ip_address': ip,
                  'timestamp': datetime.now(timezone.utc).isoformat()
              }
              table.put_item(Item=item)
              origin = (event.get('headers') or {}).get('origin', '')
              return {
                  'statusCode': 200,
                  'headers': {
                      'Access-Control-Allow-Origin': origin,
                      'Access-Control-Allow-Headers': 'Content-Type',
                      'Access-Control-Allow-Methods': 'POST,OPTIONS',
                      'Content-Type': 'application/json'
                  },
                  'body': json.dumps({'message': 'IP logged', 'ip': ip})
              }
      Tags:
        - Key: Project
          Value: show-my-ip

  # ── Lambda: get IPs (admin) ───────────────────────────────────────────────
  GetIpsFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    Properties:
      FunctionName: ip-logger-get
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: get_ips.handler
      Timeout: 10
      Environment:
        Variables:
          ADMIN_API_KEY: !Ref AdminApiKey
      Code:
        ZipFile: |
          import boto3, json, os
          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('ip_logs')
          def handler(event, context):
              headers = event.get('headers') or {}
              api_key = headers.get('x-admin-key') or headers.get('X-Admin-Key', '')
              expected_key = os.environ.get('ADMIN_API_KEY', '')
              if not expected_key or api_key != expected_key:
                  return {'statusCode': 403, 'headers': {'Content-Type': 'application/json'}, 'body': json.dumps({'error': 'Forbidden'})}
              result = table.scan()
              items = result.get('Items', [])
              while 'LastEvaluatedKey' in result:
                  result = table.scan(ExclusiveStartKey=result['LastEvaluatedKey'])
                  items.extend(result.get('Items', []))
              items.sort(key=lambda x: x.get('timestamp', ''), reverse=True)
              origin = (event.get('headers') or {}).get('origin', '')
              return {
                  'statusCode': 200,
                  'headers': {
                      'Access-Control-Allow-Origin': origin,
                      'Access-Control-Allow-Headers': 'Content-Type,X-Admin-Key',
                      'Access-Control-Allow-Methods': 'GET,OPTIONS',
                      'Content-Type': 'application/json'
                  },
                  'body': json.dumps({'items': items, 'count': len(items)})
              }
      Tags:
        - Key: Project
          Value: show-my-ip

  # ── API Gateway ───────────────────────────────────────────────────────────
  RestApi:
    Type: AWS::ApiGateway::RestApi
    DeletionPolicy: Retain
    Properties:
      Name: ip-logger-api
      Description: Show My IP REST API
      EndpointConfiguration:
        Types:
          - REGIONAL

  # /log-ip resource
  LogIpResource:
    Type: AWS::ApiGateway::Resource
    DeletionPolicy: Retain
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: log-ip

  # POST /log-ip
  LogIpPostMethod:
    Type: AWS::ApiGateway::Method
    DeletionPolicy: Retain
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref LogIpResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - LambdaArn: !GetAtt LogIpFunction.Arn

  # OPTIONS /log-ip (CORS preflight)
  LogIpOptionsMethod:
    Type: AWS::ApiGateway::Method
    DeletionPolicy: Retain
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref LogIpResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode":200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Admin-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # /admin resource
  AdminResource:
    Type: AWS::ApiGateway::Resource
    DeletionPolicy: Retain
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: admin

  # /admin/ips resource
  AdminIpsResource:
    Type: AWS::ApiGateway::Resource
    DeletionPolicy: Retain
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref AdminResource
      PathPart: ips

  # GET /admin/ips
  AdminIpsGetMethod:
    Type: AWS::ApiGateway::Method
    DeletionPolicy: Retain
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref AdminIpsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - LambdaArn: !GetAtt GetIpsFunction.Arn

  # OPTIONS /admin/ips (CORS preflight)
  AdminIpsOptionsMethod:
    Type: AWS::ApiGateway::Method
    DeletionPolicy: Retain
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref AdminIpsResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode":200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Admin-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # API Gateway Deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DeletionPolicy: Retain
    DependsOn:
      - LogIpPostMethod
      - LogIpOptionsMethod
      - AdminIpsGetMethod
      - AdminIpsOptionsMethod
    Properties:
      RestApiId: !Ref RestApi
      StageName: prod

  # Lambda permissions for API Gateway
  LogIpLambdaPermission:
    Type: AWS::Lambda::Permission
    DeletionPolicy: Retain
    Properties:
      FunctionName: !GetAtt LogIpFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/POST/log-ip

  GetIpsLambdaPermission:
    Type: AWS::Lambda::Permission
    DeletionPolicy: Retain
    Properties:
      FunctionName: !GetAtt GetIpsFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/GET/admin/ips

  # ── S3 Bucket (private) ───────────────────────────────────────────────────
  StaticSiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub ip-logger-static-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: show-my-ip

  # ── CloudFront OAC ────────────────────────────────────────────────────────
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    DeletionPolicy: Retain
    Properties:
      OriginAccessControlConfig:
        Name: ip-logger-oac
        Description: OAC for Show My IP S3 bucket
        SigningProtocol: sigv4
        SigningBehavior: always
        OriginAccessControlOriginType: s3

  # ── CloudFront Distribution ───────────────────────────────────────────────
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DeletionPolicy: Retain
    Properties:
      DistributionConfig:
        Comment: Show My IP static site
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2
        Aliases:
          - !Ref CustomDomain
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: s3-show-my-ip
            DomainName: !Sub ${StaticSiteBucket}.s3.${AWS::Region}.amazonaws.com
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: s3-show-my-ip
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
      Tags:
        - Key: Project
          Value: show-my-ip

  # S3 bucket policy — allow CloudFront OAC only
  StaticSiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DeletionPolicy: Retain
    Properties:
      Bucket: !Ref StaticSiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${StaticSiteBucket}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # ── ACM Certificate (us-east-1, required for CloudFront) ─────────────────
  # NOTE: This resource is defined here for documentation purposes.
  # The certificate must be created in us-east-1 and validated via DNS
  # before the CloudFront distribution can use it.
  # If deploying fresh, use the AcmCertificateArn parameter to supply
  # a pre-issued certificate ARN, or enable the resource below and deploy
  # from us-east-1.
  #
  # AcmCertificate:
  #   Type: AWS::CertificateManager::Certificate
  #   Properties:
  #     DomainName: !Ref CustomDomain
  #     ValidationMethod: DNS
  #     Tags:
  #       - Key: Project
  #         Value: show-my-ip

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  PublicPageUrl:
    Description: Public IP lookup page
    Value: !Sub https://${CustomDomain}/index.html

  AdminPageUrl:
    Description: Admin IP records dashboard
    Value: !Sub https://${CustomDomain}/admin.html

  CloudFrontUrl:
    Description: CloudFront distribution URL (use if custom domain not configured)
    Value: !Sub https://${CloudFrontDistribution.DomainName}/index.html

  ApiEndpoint:
    Description: Base URL of the API Gateway
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod

  CloudFrontDomain:
    Description: CloudFront distribution domain
    Value: !GetAtt CloudFrontDistribution.DomainName

  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref IpLogsTable

  S3BucketName:
    Description: S3 bucket for static assets
    Value: !Ref StaticSiteBucket
